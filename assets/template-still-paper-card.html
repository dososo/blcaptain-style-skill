<!doctype html>
<html lang="zh-CN" data-system="still-paper" data-theme="SP-01 Mist Field">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BLCaptain Still Paper Seed</title>
<style>
:root {
  --sp-display: "Source Serif 4", "Newsreader", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", Georgia, serif;
  --sp-body: "IBM Plex Sans", "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", "Noto Sans", system-ui, sans-serif;
  --sp-label: "IBM Plex Sans", "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", system-ui, sans-serif;
  --sp-num: "IBM Plex Sans", "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", system-ui, sans-serif;
  --bg: #F2F3EC;
  --surface: #FFFFFA;
  --fg: #1D241D;
  --muted: #69705F;
  --accent: #6F805D;
  --line: #D8DDCF;
}
* { box-sizing: border-box; }
body { margin: 0; background: #D8DDCF; font-family: var(--sp-body); }
.poster {
  width: 1080px;
  height: 1440px;
  background:
    radial-gradient(circle at 78% 12%, rgba(111, 128, 93, .12), transparent 26%),
    repeating-linear-gradient(0deg, rgba(29, 36, 29, .026) 0 1px, transparent 1px 5px),
    var(--bg);
  color: var(--fg);
  padding: 76px 78px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.sp-label { font-family: var(--sp-label); font-size: 15px; line-height: 1.25; letter-spacing: .10em; color: var(--accent); }
.sp-display { font-family: var(--sp-display); font-size: 76px; line-height: 1.10; letter-spacing: 0; font-weight: 620; margin: 0; }
.sp-body { font-family: var(--sp-body); font-size: 24px; line-height: 1.52; letter-spacing: 0; font-weight: 430; color: var(--muted); margin: 0; }
.sp-caption { font-family: var(--sp-label); font-size: 14px; line-height: 1.35; letter-spacing: .06em; color: var(--muted); }
.sp-number { font-family: var(--sp-num); font-size: 34px; line-height: 1; letter-spacing: 0; font-weight: 520; color: var(--accent); font-variant-numeric: tabular-nums; }
.sp-quote { font-family: var(--sp-display); font-size: 46px; line-height: 1.18; letter-spacing: 0; color: var(--fg); }
.latin { font-family: var(--sp-label); }
.num { font-family: var(--sp-num); font-variant-numeric: tabular-nums; }
.rule { height: 1px; background: var(--line); width: 100%; }
.surface { background: color-mix(in srgb, var(--surface) 86%, transparent); border: 1px solid var(--line); padding: 28px; }
</style>
</head>
<body>

</body>
</html>
